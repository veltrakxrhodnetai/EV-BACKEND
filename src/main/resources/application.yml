server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}

spring:
  lifecycle:
    timeout-per-shutdown-phase: ${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:30s}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/evcsms}
    username: ${SPRING_DATASOURCE_USERNAME:evuser}
    password: ${SPRING_DATASOURCE_PASSWORD:evpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: never  # Flyway handles migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://veltrakev.com,http://api.veltrakev.com}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

logging:
  level:
    com.evcsms: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:DEBUG}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

# Payment gateway configuration
app:
  charging:
    ac-no-energy-timeout-seconds: ${APP_CHARGING_AC_NO_ENERGY_TIMEOUT_SECONDS:60}
    offline-session-timeout-seconds: ${APP_CHARGING_OFFLINE_SESSION_TIMEOUT_SECONDS:120}
  ocpp:
    presence:
      minimum-offline-threshold-seconds: ${APP_OCPP_MINIMUM_OFFLINE_THRESHOLD_SECONDS:90}
      heartbeat-miss-multiplier: ${APP_OCPP_HEARTBEAT_MISS_MULTIPLIER:3}
      watchdog-interval-millis: ${APP_OCPP_WATCHDOG_INTERVAL_MILLIS:15000}
      stale-charging-mitigation-cooldown-seconds: ${APP_OCPP_STALE_CHARGING_MITIGATION_COOLDOWN_SECONDS:15}
  payment:
    webhook:
      skip-signature-validation: ${APP_PAYMENT_WEBHOOK_SKIP_SIGNATURE:false}
      mock-signature-validation: ${APP_PAYMENT_WEBHOOK_MOCK:true}
  auth:
    otp:
      ttl-seconds: ${OTP_TTL_SECONDS:300}
      allow-dev-test-otp: ${OTP_ALLOW_DEV_TEST:false}
      sms-required: ${OTP_SMS_REQUIRED:true}
      msg91:
        enabled: ${MSG91_ENABLED:true}
        auth-key: ${MSG91_AUTH_KEY:}
        template-id: ${MSG91_TEMPLATE_ID:69e8c993b6c8931b61090803}
        country-code: ${MSG91_COUNTRY_CODE:91}
        mode: ${MSG91_MODE:flow}
        endpoint: ${MSG91_OTP_ENDPOINT:https://control.msg91.com/api/v5/otp}
        flow-endpoint: ${MSG91_FLOW_ENDPOINT:https://control.msg91.com/api/v5/flow}
        flow-otp-var-name: ${MSG91_FLOW_OTP_VAR_NAME:VAR1}
        charge-complete-template-id: ${MSG91_CHARGE_COMPLETE_TEMPLATE_ID:69e8c91aec4ab5ed1b08dfe2}

# Razorpay configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
