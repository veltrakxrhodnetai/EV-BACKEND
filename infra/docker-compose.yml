services:
  postgres:
    image: postgres:15
    container_name: evcsms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evuser
      POSTGRES_PASSWORD: evpass
      POSTGRES_DB: evcsms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evuser -d evcsms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional DB admin UI
  adminer:
    image: adminer
    container_name: evcsms-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    profiles:
      - tools

  # Backend service
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: evcsms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evcsms
      SPRING_DATASOURCE_USERNAME: evuser
      SPRING_DATASOURCE_PASSWORD: evpass
      SPRING_JPA_SHOW_SQL: "false"
      LOG_LEVEL: INFO
      SQL_LOG_LEVEL: WARN
  #     CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://frontend:5173
