version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: evcsms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evuser
      POSTGRES_PASSWORD: evpass
      POSTGRES_DB: evcsms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evuser -d evcsms"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: evcsms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend-blue
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend-blue:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: evcsms-backend-blue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evcsms
      SPRING_DATASOURCE_USERNAME: evuser
      SPRING_DATASOURCE_PASSWORD: evpass
      SPRING_JPA_SHOW_SQL: "false"
      LOG_LEVEL: INFO
      SQL_LOG_LEVEL: WARN
      CORS_ALLOWED_ORIGINS: http://145.223.18.47,http://veltrakev.com,http://api.veltrakev.com
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend-green:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: evcsms-backend-green
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evcsms
      SPRING_DATASOURCE_USERNAME: evuser
      SPRING_DATASOURCE_PASSWORD: evpass
      SPRING_JPA_SHOW_SQL: "false"
      LOG_LEVEL: INFO
      SQL_LOG_LEVEL: WARN
      CORS_ALLOWED_ORIGINS: http://145.223.18.47,http://veltrakev.com,http://api.veltrakev.com
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
