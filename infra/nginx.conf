user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Define upstream backends
    upstream backend_blue {
        server backend-blue:8080 max_fails=3 fail_timeout=10s;
    }

    upstream backend_green {
        server backend-green:8080 max_fails=3 fail_timeout=10s;
    }

    # Map file to control which backend is active
    map $backend_selector {
        "blue"  "backend_blue";
        default "backend_blue";
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 10M;

        # Health check endpoint for nginx itself
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API endpoints - route to active backend
        location /api/ {
            proxy_pass http://$backend_selector;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Actuator endpoints for monitoring
        location /actuator/ {
            proxy_pass http://$backend_selector;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Direct blue and green port access for switching/testing
        location /blue/ {
            proxy_pass http://backend-blue:8080/;
            proxy_set_header Host $host;
        }

        location /green/ {
            proxy_pass http://backend-green:8080/;
            proxy_set_header Host $host;
        }
    }
}
